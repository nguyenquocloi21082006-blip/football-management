<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Cầu Thủ - {{ team.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: white;
            color: white;
        }
        .form-select option {
            background: #1e3c72;
            color: white;
        }
        .btn-custom {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            margin: 5px;
        }
        .btn-custom:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>➕ Thêm Cầu Thủ Mới</h1>
            <a href="/team/{{ team.id }}/players" class="btn btn-custom btn-lg">🔙 Quay Lại</a>
        </div>
        
        <div class="form-container">
            <h3 class="text-center mb-4">Đội: {{ team.name }}</h3>
            <form method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Tên Cầu Thủ</label>
                    <input type="text" class="form-control" id="name" name="name" required placeholder="Nhập tên cầu thủ">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="number" class="form-label">Số Áo</label>
                        <input type="number" class="form-control" id="number" name="number" placeholder="Số áo">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="age" class="form-label">Tuổi</label>
                        <input type="number" class="form-control" id="age" name="age" placeholder="Tuổi">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="position" class="form-label">Vị Trí</label>
                    <select class="form-select" id="position" name="position">
                        <option value="">Chọn vị trí</option>
                        <option value="Thủ môn">Thủ môn</option>
                        <option value="Hậu vệ">Hậu vệ</option>
                        <option value="Tiền vệ">Tiền vệ</option>
                        <option value="Tiền đạo">Tiền đạo</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-custom btn-lg w-100">💾 Lưu Cầu Thủ</button>
            </form>
        </div>
    </div>
</body>
</html>

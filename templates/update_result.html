<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập Nhật Kết Quả</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        .match-info {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: white;
            color: white;
        }
        .score-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .vs {
            font-size: 2rem;
            font-weight: bold;
        }
        .team-name {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }
        .btn-custom {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            margin: 5px;
        }
        .btn-custom:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>📝 Cập Nhật Kết Quả</h1>
            <a href="/bracket" class="btn btn-custom btn-lg">🔙 Quay Lại</a>
        </div>
        
        <div class="form-container">
            <div class="match-info">
                <h3 class="text-center mb-3">{{ match.round_name }}</h3>
                <div class="team-name">{{ match.team1.name if match.team1 else 'Đội 1' }}</div>
                <div class="score-inputs">
                    <input type="number" class="form-control" id="team1_score" name="team1_score" 
                           value="{{ match.team1_score if match.team1_score is not none else '' }}" 
                           style="width: 80px;" min="0" required>
                    <span class="vs">VS</span>
                    <input type="number" class="form-control" id="team2_score" name="team2_score" 
                           value="{{ match.team2_score if match.team2_score is not none else '' }}" 
                           style="width: 80px;" min="0" required>
                </div>
                <div class="team-name">{{ match.team2.name if match.team2 else 'Đội 2' }}</div>
                {% if match.match_time %}
                <p class="text-center mt-3" style="color: rgba(255, 255, 255, 0.7);">
                    ⏰ {{ match.match_time.strftime('%d/%m/%Y %H:%M') }}
                </p>
                {% endif %}
            </div>
            
            <form method="POST">
                <button type="submit" class="btn btn-custom btn-lg w-100">💾 Lưu Kết Quả</button>
            </form>
        </div>
    </div>
</body>
</html>

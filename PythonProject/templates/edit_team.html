<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh Sửa Đội Bóng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: white;
            color: white;
        }
        .btn-custom {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            margin: 5px;
        }
        .btn-custom:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>✏️ Chỉnh Sửa Đội Bóng: {{ team.name }}</h1>
            <a href="/teams" class="btn btn-custom btn-lg">🔙 Quay Lại</a>
        </div>
        
        <div class="form-container">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="name" class="form-label">Tên Đội Bóng</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ team.name }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="logo" class="form-label">Logo (URL)</label>
                        <input type="text" class="form-control" id="logo" name="logo" value="{{ team.logo or '' }}">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="stadium" class="form-label">Sân Vận Động</label>
                        <input type="text" class="form-control" id="stadium" name="stadium" value="{{ team.stadium or '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="coach" class="form-label">Huấn Luyện Viên</label>
                        <input type="text" class="form-control" id="coach" name="coach" value="{{ team.coach or '' }}">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="founded_year" class="form-label">Năm Thành Lập</label>
                        <input type="number" class="form-control" id="founded_year" name="founded_year" value="{{ team.founded_year or '' }}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="country" class="form-label">Quốc Gia</label>
                        <input type="text" class="form-control" id="country" name="country" value="{{ team.country or '' }}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="team_color" class="form-label">Màu Đội</label>
                        <input type="color" class="form-control form-control-color" id="team_color" name="team_color" value="{{ team.team_color or '#ffffff' }}" style="height: 50px;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-custom btn-lg w-100">💾 Lưu Thay Đổi</button>
            </form>
        </div>
    </div>
</body>
</html>

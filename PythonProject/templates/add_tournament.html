<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Giải Đấu Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: white;
            color: white;
        }
        .btn-custom {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            margin: 5px;
        }
        .btn-custom:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>➕ Thêm Giải Đấu Mới</h1>
            <a href="/tournaments" class="btn btn-custom btn-lg">🔙 Quay Lại</a>
        </div>
        
        <div class="form-container">
            <form method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Tên Giải Đấu</label>
                    <input type="text" class="form-control" id="name" name="name" required placeholder="Nhập tên giải đấu">
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Mô Tả</label>
                    <textarea class="form-control" id="description" name="description" rows="3" placeholder="Mô tả về giải đấu (tùy chọn)"></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="start_date" class="form-label">Ngày Bắt Đầu</label>
                        <input type="date" class="form-control" id="start_date" name="start_date">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="end_date" class="form-label">Ngày Kết Thúc</label>
                        <input type="date" class="form-control" id="end_date" name="end_date">
                    </div>
                </div>
                <button type="submit" class="btn btn-custom btn-lg w-100">💾 Lưu Giải Đấu</button>
            </form>
        </div>
    </div>
</body>
</html>
